<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">FROM PROMPTING TO LOOP ENGINEERING</text>
  
  <!-- Left side: Manual Prompting -->
  <g transform="translate(250, 300)">
    <!-- Section title -->
    <text x="250" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#e74c3c">THE OLD WAY</text>
    
    <!-- Computer screen -->
    <rect x="50" y="0" width="400" height="250" fill="#f8f9fa" stroke="#34495e" stroke-width="5" rx="12"/>
    <rect x="65" y="15" width="370" height="220" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Screen content -->
    <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Terminal Output</text>
    <line x1="80" y1="75" x2="420" y2="75" stroke="#ecf0f1" stroke-width="1"/>
    
    <!-- Prompt text on screen -->
    <text x="100" y="100" font-family="monospace" font-size="18" fill="#27ae60">$ claude "Fix this bug"</text>
    <text x="100" y="125" font-family="monospace" font-size="18" fill="#3498db">Agent: I'll fix the bug...</text>
    <text x="100" y="150" font-family="monospace" font-size="18" fill="#27ae60">$ claude "Add this feature"</text>
    <text x="100" y="175" font-family="monospace" font-size="18" fill="#3498db">Agent: I'll add the feature...</text>
    <text x="100" y="200" font-family="monospace" font-size="18" fill="#27ae60">$ claude "Refactor this code"</text>
    
    <!-- Keyboard -->
    <rect x="120" y="270" width="260" height="65" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="8"/>
    <rect x="145" y="285" width="210" height="35" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1" rx="4"/>
    
    <!-- 小黑 character (left side - manually typing) -->
    <g transform="translate(250, 450)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="60" ry="55" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-18" cy="-12" r="10" fill="white"/>
      <circle cx="18" cy="-12" r="10" fill="white"/>
      <circle cx="-18" cy="-12" r="5" fill="#2c3e50"/>
      <circle cx="18" cy="-12" r="5" fill="#2c3e50"/>
      <!-- Arms -->
      <line x1="-45" y1="15" x2="-90" y2="-30" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <line x1="45" y1="15" x2="90" y2="-30" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <!-- Hands -->
      <circle cx="-90" cy="-30" r="14" fill="#2c3e50"/>
      <circle cx="90" cy="-30" r="14" fill="#2c3e50"/>
      <!-- Legs -->
      <line x1="-25" y1="55" x2="-30" y2="120" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <line x1="25" y1="55" x2="30" y2="120" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <!-- Feet -->
      <ellipse cx="-30" cy="130" rx="20" ry="10" fill="#2c3e50"/>
      <ellipse cx="30" cy="130" rx="20" ry="10" fill="#2c3e50"/>
    </g>
    
    <!-- Typing action lines -->
    <line x1="180" y1="380" x2="120" y2="320" stroke="#e74c3c" stroke-width="4" stroke-dasharray="10,5"/>
    <line x1="320" y1="380" x2="380" y2="320" stroke="#e74c3c" stroke-width="4" stroke-dasharray="10,5"/>
    
    <!-- Labels -->
    <text x="250" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e74c3c">Manual Prompting</text>
    <text x="250" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">One prompt at a time</text>
    <text x="250" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">You are the human in the loop</text>
  </g>
  
  <!-- Orange transformation arrow -->
  <g transform="translate(750, 500)">
    <path d="M 0 0 Q 300 -75 600 0" fill="none" stroke="#f39c12" stroke-width="8" stroke-linecap="round"/>
    <polygon points="600,0 570,-22 570,22" fill="#f39c12"/>
    <text x="300" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f39c12">TRANSFORM</text>
  </g>
  
  <!-- Right side: Loop Engineering -->
  <g transform="translate(1300, 300)">
    <!-- Section title -->
    <text x="250" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#27ae60">THE NEW WAY</text>
    
    <!-- System diagram -->
    <rect x="50" y="0" width="400" height="250" fill="#f8f9fa" stroke="#34495e" stroke-width="5" rx="12"/>
    <rect x="65" y="15" width="370" height="220" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- System components -->
    <rect x="100" y="40" width="120" height="60" fill="#3498db" stroke="#2980b9" stroke-width="3" rx="8"/>
    <text x="160" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">SCHEDULE</text>
    
    <rect x="240" y="40" width="120" height="60" fill="#e67e22" stroke="#d35400" stroke-width="3" rx="8"/>
    <text x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">AGENT</text>
    
    <rect x="100" y="120" width="120" height="60" fill="#2ecc71" stroke="#27ae60" stroke-width="3" rx="8"/>
    <text x="160" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">VERIFY</text>
    
    <rect x="240" y="120" width="120" height="60" fill="#9b59b6" stroke="#8e44ad" stroke-width="3" rx="8"/>
    <text x="300" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">MEMORY</text>
    
    <!-- Arrows inside system -->
    <path d="M 220 70 L 240 70" fill="none" stroke="#f39c12" stroke-width="4" marker-end="url(#arrowhead)"/>
    <path d="M 300 100 L 300 120" fill="none" stroke="#f39c12" stroke-width="4" marker-end="url(#arrowhead)"/>
    <path d="M 240 150 L 220 150" fill="none" stroke="#f39c12" stroke-width="4" marker-end="url(#arrowhead)"/>
    <path d="M 160 120 L 160 100" fill="none" stroke="#f39c12" stroke-width="4" marker-end="url(#arrowhead)"/>
    
    <!-- 小黑 character (right side - designing system) -->
    <g transform="translate(250, 400)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="60" ry="55" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-18" cy="-12" r="10" fill="white"/>
      <circle cx="18" cy="-12" r="10" fill="white"/>
      <circle cx="-18" cy="-12" r="5" fill="#2c3e50"/>
      <circle cx="18" cy="-12" r="5" fill="#2c3e50"/>
      <!-- Arms -->
      <line x1="-45" y1="15" x2="-90" y2="-30" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <line x1="45" y1="15" x2="90" y2="-30" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <!-- Hands -->
      <circle cx="-90" cy="-30" r="14" fill="#2c3e50"/>
      <circle cx="90" cy="-30" r="14" fill="#2c3e50"/>
      <!-- Legs -->
      <line x1="-25" y1="55" x2="-30" y2="120" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <line x1="25" y1="55" x2="30" y2="120" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
      <!-- Feet -->
      <ellipse cx="-30" cy="130" rx="20" ry="10" fill="#2c3e50"/>
      <ellipse cx="30" cy="130" rx="20" ry="10" fill="#2c3e50"/>
    </g>
    
    <!-- Designing action lines -->
    <line x1="180" y1="330" x2="120" y2="270" stroke="#27ae60" stroke-width="4" stroke-dasharray="10,5"/>
    <line x1="320" y1="330" x2="380" y2="270" stroke="#27ae60" stroke-width="4" stroke-dasharray="10,5"/>
    
    <!-- Labels -->
    <text x="250" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#27ae60">Loop Engineering</text>
    <text x="250" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">Design the system</text>
    <text x="250" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">That generates prompts</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
  
  <!-- Bottom annotation -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">"You shouldn't be prompting coding agents anymore. You should be designing loops that prompt your agents."</text>
  <text x="1200" y="1290" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#95a5a6">— Peter Steinberger (6.5M views)</text>
</svg>