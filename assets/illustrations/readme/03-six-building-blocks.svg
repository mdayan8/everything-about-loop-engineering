<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">THE SIX BUILDING BLOCKS</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Components that make up a loop engineering system</text>
  
  <!-- Central 小黑 character -->
  <g transform="translate(1200, 675)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="75" ry="68" fill="#2c3e50"/>
    <!-- Eyes -->
    <circle cx="-22" cy="-15" r="12" fill="white"/>
    <circle cx="22" cy="-15" r="12" fill="white"/>
    <circle cx="-22" cy="-15" r="6" fill="#2c3e50"/>
    <circle cx="22" cy="-15" r="6" fill="#2c3e50"/>
    <!-- Arms -->
    <line x1="-60" y1="15" x2="-120" y2="-45" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <line x1="60" y1="15" x2="120" y2="-45" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="-120" cy="-45" r="16" fill="#2c3e50"/>
    <circle cx="120" cy="-45" r="16" fill="#2c3e50"/>
    <!-- Legs -->
    <line x1="-30" y1="68" x2="-38" y2="150" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <line x1="30" y1="68" x2="38" y2="150" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-38" cy="165" rx="22" ry="12" fill="#2c3e50"/>
    <ellipse cx="38" cy="165" rx="22" ry="12" fill="#2c3e50"/>
  </g>
  
  <!-- Building block 1: Automations (top) -->
  <g transform="translate(1200, 250)">
    <rect x="-120" y="-50" width="240" height="100" fill="#3498db" stroke="#2980b9" stroke-width="4" rx="12"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">AUTOMATIONS</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d6eaf8">Schedule & trigger loops</text>
    
    <!-- Connection line to center -->
    <line x1="0" y1="50" x2="0" y2="375" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Building block 2: Worktrees (top right) -->
  <g transform="translate(1680, 440)">
    <rect x="-120" y="-50" width="240" height="100" fill="#e67e22" stroke="#d35400" stroke-width="4" rx="12"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">WORKTREES</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fdebd0">Isolate parallel agents</text>
    
    <!-- Connection line to center -->
    <line x1="-120" y1="0" x2="-360" y2="235" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Building block 3: Skills (right) -->
  <g transform="translate(1800, 675)">
    <rect x="-120" y="-50" width="240" height="100" fill="#2ecc71" stroke="#27ae60" stroke-width="4" rx="12"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">SKILLS</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d5f5e3">Project context for agents</text>
    
    <!-- Connection line to center -->
    <line x1="-120" y1="0" x2="-480" y2="0" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Building block 4: Plugins (bottom right) -->
  <g transform="translate(1680, 910)">
    <rect x="-120" y="-50" width="240" height="100" fill="#9b59b6" stroke="#8e44ad" stroke-width="4" rx="12"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">PLUGINS</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#e8daef">External tool access</text>
    
    <!-- Connection line to center -->
    <line x1="-120" y1="0" x2="-360" y2="-235" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Building block 5: Sub-Agents (bottom) -->
  <g transform="translate(1200, 1100)">
    <rect x="-120" y="-50" width="240" height="100" fill="#e74c3c" stroke="#c0392b" stroke-width="4" rx="12"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">SUB-AGENTS</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fadbd8">Independent verification</text>
    
    <!-- Connection line to center -->
    <line x1="0" y1="-50" x2="0" y2="-375" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Building block 6: Memory (bottom left) -->
  <g transform="translate(720, 910)">
    <rect x="-120" y="-50" width="240" height="100" fill="#1abc9c" stroke="#16a085" stroke-width="4" rx="12"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">MEMORY</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d1f2eb">Persistent state files</text>
    
    <!-- Connection line to center -->
    <line x1="120" y1="0" x2="360" y2="-235" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Connection label -->
  <g transform="translate(600, 675)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f39c12">COMBINE</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">&</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f39c12">COORDINATE</text>
    
    <!-- Connection line to center -->
    <line x1="120" y1="0" x2="480" y2="0" stroke="#f39c12" stroke-width="4" stroke-dasharray="12,6"/>
  </g>
  
  <!-- Additional connection lines between blocks -->
  <line x1="1320" y1="280" x2="1560" y2="390" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="6,6"/>
  <line x1="1800" y1="490" x2="1800" y2="625" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="6,6"/>
  <line x1="1680" y1="860" x2="1320" y2="1050" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="6,6"/>
  <line x1="720" y1="860" x2="1160" y2="1050" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="6,6"/>
  <line x1="600" y1="645" x2="1160" y2="675" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="6,6"/>
  
  <!-- Bottom annotation -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">A minimal loop needs only 2 components: Memory + Automations</text>
  <text x="1200" y="1290" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#95a5a6">Production loops typically use 4-5 components</text>
</svg>