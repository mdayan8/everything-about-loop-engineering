<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">LOOP ENGINEERING MATURITY MODEL</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Three tiers of autonomy: from reporting to full independence</text>
  
  <!-- L1 Level (Bottom) -->
  <g transform="translate(250, 750)">
    <!-- Platform -->
    <rect x="0" y="0" width="500" height="150" fill="#f8f9fa" stroke="#34495e" stroke-width="5" rx="12"/>
    <rect x="12" y="12" width="476" height="126" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Level indicator -->
    <rect x="25" y="25" width="100" height="50" fill="#3498db" stroke="#2980b9" stroke-width="3" rx="8"/>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">L1</text>
    
    <!-- 小黑 reading report -->
    <g transform="translate(190, 75)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="35" ry="30" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-10" cy="-7" r="6" fill="white"/>
      <circle cx="10" cy="-7" r="6" fill="white"/>
      <circle cx="-10" cy="-7" r="3" fill="#2c3e50"/>
      <circle cx="10" cy="-7" r="3" fill="#2c3e50"/>
      <!-- Arms -->
      <line x1="-28" y1="8" x2="-50" y2="-15" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <line x1="28" y1="8" x2="50" y2="-15" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="-14" y1="30" x2="-16" y2="60" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <line x1="14" y1="30" x2="16" y2="60" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
    </g>
    
    <!-- Report document -->
    <rect x="280" y="25" width="190" height="100" fill="white" stroke="#34495e" stroke-width="3"/>
    <line x1="300" y1="50" x2="450" y2="50" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="300" y1="70" x2="450" y2="70" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="300" y1="90" x2="450" y2="90" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="300" y1="110" x2="420" y2="110" stroke="#bdc3c7" stroke-width="1"/>
    <text x="375" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">REPORT</text>
    
    <!-- Labels -->
    <text x="250" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#3498db">L1: Report Only</text>
    <text x="250" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Reads, observes, writes down</text>
    <text x="250" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Changes nothing</text>
    <text x="250" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#27ae60">✓ Low risk</text>
    <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#27ae60">✓ Most loops stay here</text>
  </g>
  
  <!-- Orange arrow up -->
  <path d="M 500 680 L 500 560" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  <text x="520" y="620" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">Advance when proven</text>
  
  <!-- L2 Level (Middle) -->
  <g transform="translate(250, 380)">
    <!-- Platform -->
    <rect x="0" y="0" width="500" height="150" fill="#f8f9fa" stroke="#34495e" stroke-width="5" rx="12"/>
    <rect x="12" y="12" width="476" height="126" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Level indicator -->
    <rect x="25" y="25" width="100" height="50" fill="#f39c12" stroke="#e67e22" stroke-width="3" rx="8"/>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">L2</text>
    
    <!-- 小黑 proposing changes -->
    <g transform="translate(190, 75)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="35" ry="30" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-10" cy="-7" r="6" fill="white"/>
      <circle cx="10" cy="-7" r="6" fill="white"/>
      <circle cx="-10" cy="-7" r="3" fill="#2c3e50"/>
      <circle cx="10" cy="-7" r="3" fill="#2c3e50"/>
      <!-- Arms -->
      <line x1="-28" y1="8" x2="-50" y2="-15" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <line x1="28" y1="8" x2="50" y2="-15" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="-14" y1="30" x2="-16" y2="60" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <line x1="14" y1="30" x2="16" y2="60" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
    </g>
    
    <!-- Proposal document -->
    <rect x="280" y="25" width="190" height="100" fill="white" stroke="#f39c12" stroke-width="3"/>
    <circle cx="375" cy="65" r="25" fill="none" stroke="#f39c12" stroke-width="3"/>
    <text x="375" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#f39c12">PROPOSE</text>
    
    <!-- Labels -->
    <text x="250" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f39c12">L2: Assisted</text>
    <text x="250" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Proposes narrow-scope changes</text>
    <text x="250" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Human reviews and merges</text>
    <text x="250" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">⚠ Medium risk</text>
    <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">⚠ After L1 proven</text>
  </g>
  
  <!-- Orange arrow up -->
  <path d="M 500 310 L 500 190" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  <text x="520" y="250" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">Advance when proven</text>
  
  <!-- L3 Level (Top) -->
  <g transform="translate(250, 0)">
    <!-- Platform -->
    <rect x="0" y="0" width="500" height="150" fill="#f8f9fa" stroke="#34495e" stroke-width="5" rx="12"/>
    <rect x="12" y="12" width="476" height="126" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Level indicator -->
    <rect x="25" y="25" width="100" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="3" rx="8"/>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">L3</text>
    
    <!-- 小黑 deploying autonomously -->
    <g transform="translate(190, 75)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="35" ry="30" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-10" cy="-7" r="6" fill="white"/>
      <circle cx="10" cy="-7" r="6" fill="white"/>
      <circle cx="-10" cy="-7" r="3" fill="#2c3e50"/>
      <circle cx="10" cy="-7" r="3" fill="#2c3e50"/>
      <!-- Arms -->
      <line x1="-28" y1="8" x2="-50" y2="-15" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <line x1="28" y1="8" x2="50" y2="-15" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="-14" y1="30" x2="-16" y2="60" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
      <line x1="14" y1="30" x2="16" y2="60" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
    </g>
    
    <!-- Deployment arrow -->
    <path d="M 280 65 L 440 65" fill="none" stroke="#e74c3c" stroke-width="6" marker-end="url(#arrowhead)"/>
    <text x="360" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e74c3c">DEPLOY</text>
    
    <!-- Labels -->
    <text x="250" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e74c3c">L3: Unattended</text>
    <text x="250" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Commits, merges, deploys</text>
    <text x="250" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Fully autonomous</text>
    <text x="250" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#e74c3c">✗ High risk</text>
    <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#e74c3c">✗ Few tasks earn this</text>
  </g>
  
  <!-- Risk indicator on right -->
  <g transform="translate(900, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">RISK LEVEL</text>
    
    <rect x="0" y="40" width="200" height="50" fill="#27ae60" stroke="#229954" stroke-width="3" rx="8"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">LOW</text>
    
    <rect x="0" y="100" width="200" height="50" fill="#f39c12" stroke="#e67e22" stroke-width="3" rx="8"/>
    <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">MEDIUM</text>
    
    <rect x="0" y="160" width="200" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="3" rx="8"/>
    <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">HIGH</text>
    
    <text x="100" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Most loops stay at L1</text>
    <text x="100" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Few tasks earn L3</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>