<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">THE SIX PRODUCTION PATTERNS</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Battle-tested loop patterns from low-cost to high-frequency</text>
  
  <!-- Path/route -->
  <path d="M 250 625 Q 500 375 750 625 Q 1000 875 1250 625 Q 1500 375 1750 625 Q 2000 875 2250 625" 
        fill="none" stroke="#f39c12" stroke-width="8" stroke-dasharray="15,8"/>
  
  <!-- Pattern 1: Daily Triage -->
  <g transform="translate(375, 500)">
    <circle cx="0" cy="0" r="50" fill="#3498db" stroke="#2980b9" stroke-width="4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">DAILY</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">TRIAGE</text>
    
    <!-- 小黑 at this station -->
    <g transform="translate(0, 85)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <!-- Legs -->
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#3498db">Daily Triage</text>
    <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">Once daily • L1 • Low cost</text>
  </g>
  
  <!-- Pattern 2: Changelog Drafter -->
  <g transform="translate(750, 750)">
    <circle cx="0" cy="0" r="50" fill="#2ecc71" stroke="#27ae60" stroke-width="4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">CHANGELOG</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">DRAFTER</text>
    
    <!-- 小黑 at this station -->
    <g transform="translate(0, 85)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <!-- Legs -->
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2ecc71">Changelog Drafter</text>
    <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">Daily • L1 • Low cost</text>
  </g>
  
  <!-- Pattern 3: Post-Merge Cleanup -->
  <g transform="translate(1125, 500)">
    <circle cx="0" cy="0" r="50" fill="#9b59b6" stroke="#8e44ad" stroke-width="4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">POST-MERGE</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">CLEANUP</text>
    
    <!-- 小黑 at this station -->
    <g transform="translate(0, 85)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <!-- Legs -->
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#9b59b6">Post-Merge Cleanup</text>
    <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">1-6h • L1 • Low cost</text>
  </g>
  
  <!-- Pattern 4: Dependency Sweeper -->
  <g transform="translate(1500, 750)">
    <circle cx="0" cy="0" r="50" fill="#e67e22" stroke="#d35400" stroke-width="4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">DEPENDENCY</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">SWEEPER</text>
    
    <!-- 小黑 at this station -->
    <g transform="translate(0, 85)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <!-- Legs -->
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e67e22">Dependency Sweeper</text>
    <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">6h-1d • L2 • Medium cost</text>
  </g>
  
  <!-- Pattern 5: PR Babysitter -->
  <g transform="translate(1875, 500)">
    <circle cx="0" cy="0" r="50" fill="#e74c3c" stroke="#c0392b" stroke-width="4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">PR</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">BABYSITTER</text>
    
    <!-- 小黑 at this station -->
    <g transform="translate(0, 85)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <!-- Legs -->
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e74c3c">PR Babysitter</text>
    <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">5-15min • L1 • High cost</text>
  </g>
  
  <!-- Pattern 6: CI Sweeper -->
  <g transform="translate(2250, 750)">
    <circle cx="0" cy="0" r="50" fill="#c0392b" stroke="#a93226" stroke-width="4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">CI</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">SWEEPER</text>
    
    <!-- 小黑 at this station -->
    <g transform="translate(0, 85)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <!-- Legs -->
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#c0392b">CI Sweeper</text>
    <text x="0" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">5-15min • L2 • Very high cost</text>
  </g>
  
  <!-- Risk/Cost indicator -->
  <g transform="translate(125, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">COST / RISK</text>
    
    <rect x="0" y="40" width="200" height="50" fill="#27ae60" stroke="#229954" stroke-width="3" rx="8"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">LOW</text>
    
    <rect x="0" y="100" width="200" height="50" fill="#f39c12" stroke="#e67e22" stroke-width="3" rx="8"/>
    <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">MEDIUM</text>
    
    <rect x="0" y="160" width="200" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="3" rx="8"/>
    <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">HIGH</text>
  </g>
  
  <!-- Direction arrow -->
  <path d="M 250 875 L 2250 875" fill="none" stroke="#2c3e50" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="1250" y="925" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">From low risk to high risk</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <!-- Bottom recommendation -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Start with Changelog Drafter or Daily Triage — lowest risk, immediate value</text>
</svg>