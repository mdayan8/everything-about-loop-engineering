<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">LOOP ENGINEERING CONCEPT</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Replace yourself as the prompter with a system that does it automatically</text>
  
  <!-- Machine/device -->
  <g transform="translate(1200, 500)">
    <!-- Main machine body -->
    <rect x="-300" y="-220" width="600" height="440" fill="#f8f9fa" stroke="#34495e" stroke-width="5" rx="15"/>
    <rect x="-288" y="-208" width="576" height="416" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Input section -->
    <rect x="-265" y="-185" width="220" height="150" fill="#3498db" stroke="#2980b9" stroke-width="4" rx="10"/>
    <text x="-155" y="-120" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">INPUT</text>
    <text x="-155" y="-90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d6eaf8">Codebase status</text>
    <text x="-155" y="-65" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d6eaf8">Git history</text>
    <text x="-155" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d6eaf8">Test results</text>
    
    <!-- Processing section -->
    <rect x="-25" y="-185" width="220" height="150" fill="#f39c12" stroke="#e67e22" stroke-width="4" rx="10"/>
    <text x="85" y="-120" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">PROCESS</text>
    <text x="85" y="-90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fdebd0">Analyze</text>
    <text x="85" y="-65" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fdebd0">Decide</text>
    <text x="85" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fdebd0">Generate</text>
    
    <!-- Output section -->
    <rect x="45" y="-185" width="220" height="150" fill="#2ecc71" stroke="#27ae60" stroke-width="4" rx="10"/>
    <text x="155" y="-120" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">OUTPUT</text>
    <text x="155" y="-90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d5f5e3">Prompts</text>
    <text x="155" y="-65" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d5f5e3">Instructions</text>
    <text x="155" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d5f5e3">Tasks</text>
    
    <!-- Arrows inside machine -->
    <path d="M -45 -110 L 45 -110" fill="none" stroke="#f39c12" stroke-width="5" marker-end="url(#arrowhead)"/>
    <path d="M 165 -110 L 255 -110" fill="none" stroke="#f39c12" stroke-width="5" marker-end="url(#arrowhead)"/>
    
    <!-- Control panel -->
    <rect x="-265" y="0" width="530" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="3"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">CONTROL PANEL</text>
    
    <!-- Buttons -->
    <circle cx="-180" cy="75" r="28" fill="#27ae60" stroke="#229954" stroke-width="3"/>
    <text x="-180" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">ON</text>
    
    <circle cx="-95" cy="75" r="28" fill="#f39c12" stroke="#e67e22" stroke-width="3"/>
    <text x="-95" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">TUNE</text>
    
    <circle cx="-10" cy="75" r="28" fill="#e74c3c" stroke="#c0392b" stroke-width="3"/>
    <text x="-10" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">STOP</text>
    
    <!-- Status indicators -->
    <rect x="60" y="50" width="160" height="25" fill="#27ae60" stroke="#229954" stroke-width="2" rx="4"/>
    <text x="140" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">RUNNING</text>
    
    <rect x="60" y="82" width="160" height="25" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/>
    <text x="140" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">VERIFIED</text>
    
    <!-- Output arrow -->
    <path d="M 300 60 L 420 60" fill="none" stroke="#2ecc71" stroke-width="5" marker-end="url(#arrowhead)"/>
    <text x="360" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2ecc71">AUTO PROMPTS</text>
  </g>
  
  <!-- 小黑 character operating machine -->
  <g transform="translate(1200, 875)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="75" ry="68" fill="#2c3e50"/>
    <!-- Eyes -->
    <circle cx="-22" cy="-15" r="12" fill="white"/>
    <circle cx="22" cy="-15" r="12" fill="white"/>
    <circle cx="-22" cy="-15" r="6" fill="#2c3e50"/>
    <circle cx="22" cy="-15" r="6" fill="#2c3e50"/>
    <!-- Arms reaching up to machine -->
    <line x1="-60" y1="15" x2="-120" y2="-100" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <line x1="60" y1="15" x2="120" y2="-100" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="-120" cy="-100" r="16" fill="#2c3e50"/>
    <circle cx="120" cy="-100" r="16" fill="#2c3e50"/>
    <!-- Legs -->
    <line x1="-30" y1="68" x2="-38" y2="150" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <line x1="30" y1="68" x2="38" y2="150" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-38" cy="165" rx="22" ry="12" fill="#2c3e50"/>
    <ellipse cx="38" cy="165" rx="22" ry="12" fill="#2c3e50"/>
    
    <!-- Labels -->
    <text x="0" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">LOOP ENGINEER</text>
    <text x="0" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Designs the system</text>
    <text x="0" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">That generates prompts</text>
  </g>
  
  <!-- Connection lines -->
  <line x1="1200" y1="720" x2="1200" y2="800" stroke="#2c3e50" stroke-width="4" stroke-dasharray="10,5"/>
  
  <!-- Annotations -->
  <g transform="translate(250, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e74c3c">TRADITIONAL WAY</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">• Manual input prompts</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">• One task at a time</text>
    <text x="0" y="95" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">• You are the human in the loop</text>
  </g>
  
  <g transform="translate(1900, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#27ae60">LOOP ENGINEERING</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">• System auto-generates</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">• Continuous automation</text>
    <text x="0" y="95" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">• You design the system</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>