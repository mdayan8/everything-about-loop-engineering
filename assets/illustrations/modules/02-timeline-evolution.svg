<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="960" y="80" text-anchor="middle" font-family="Arial" font-size="28" fill="black">循环工程演进时间线</text>
  
  <!-- Timeline path -->
  <path d="M 200 500 Q 400 300 600 500 Q 800 700 1000 500 Q 1200 300 1400 500 Q 1600 700 1800 500" 
        fill="none" stroke="orange" stroke-width="4" stroke-dasharray="10,5"/>
  
  <!-- Milestone 1: July 2025 -->
  <g transform="translate(300, 400)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="black" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="black">拉尔夫</text>
    
    <!-- 小黑 at milestone -->
    <circle cx="0" cy="50" r="15" fill="black"/>
    <circle cx="-3" cy="48" r="2" fill="white"/>
    <circle cx="3" cy="48" r="2" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="red">2025年7月</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">手动循环</text>
  </g>
  
  <!-- Milestone 2: September 2025 -->
  <g transform="translate(600, 600)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="black" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="black">三个月</text>
    
    <!-- 小黑 at milestone -->
    <circle cx="0" cy="50" r="15" fill="black"/>
    <circle cx="-3" cy="48" r="2" fill="white"/>
    <circle cx="3" cy="48" r="2" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="red">2025年9月</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">压力测试</text>
  </g>
  
  <!-- Milestone 3: January 2026 -->
  <g transform="translate(900, 400)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="black" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="black">一切皆循环</text>
    
    <!-- 小黑 at milestone -->
    <circle cx="0" cy="50" r="15" fill="black"/>
    <circle cx="-3" cy="48" r="2" fill="white"/>
    <circle cx="3" cy="48" r="2" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="red">2026年1月</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">模式普及</text>
  </g>
  
  <!-- Milestone 4: Early-Mid 2026 -->
  <g transform="translate(1200, 600)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="black" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="black">官方插件</text>
    
    <!-- 小黑 at milestone -->
    <circle cx="0" cy="50" r="15" fill="black"/>
    <circle cx="-3" cy="48" r="2" fill="white"/>
    <circle cx="3" cy="48" r="2" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="red">2026年早-中期</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">正式集成</text>
  </g>
  
  <!-- Milestone 5: June 2026 -->
  <g transform="translate(1500, 400)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="black" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="black">命名</text>
    
    <!-- 小黑 at milestone -->
    <circle cx="0" cy="50" r="15" fill="black"/>
    <circle cx="-3" cy="48" r="2" fill="white"/>
    <circle cx="3" cy="48" r="2" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="red">2026年6月</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">循环工程</text>
  </g>
  
  <!-- Direction arrow -->
  <path d="M 200 700 L 1800 700" fill="none" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="1000" y="750" text-anchor="middle" font-family="Arial" font-size="14" fill="black">从手动到自动化</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>