<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">LOOP ENGINEERING ACTIVITIES</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">What loop engineers actually do: three core activities</text>
  
  <!-- Activity 1: Prompt Crafting -->
  <g transform="translate(400, 500)">
    <rect x="-250" y="-250" width="500" height="500" fill="#3498db" stroke="#2980b9" stroke-width="5" rx="20"/>
    <rect x="-238" y="-238" width="476" height="476" fill="white" stroke="#d6eaf8" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-238" y="-238" width="476" height="80" fill="#3498db"/>
    <text x="0" y="-185" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">PROMPT CRAFTING</text>
    
    <!-- Icon area -->
    <rect x="-180" y="-140" width="360" height="120" fill="#d6eaf8" stroke="#3498db" stroke-width="3" rx="10"/>
    <text x="0" y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" fill="#3498db">✍️</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Design the prompts</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">That the system will use</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">to run the loop</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 150)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Labels -->
    <text x="-150" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#3498db">• System prompts</text>
    <text x="0" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#3498db">• Instructions</text>
    <text x="150" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#3498db">• Constraints</text>
  </g>
  
  <!-- Activity 2: Signal Design -->
  <g transform="translate(1200, 500)">
    <rect x="-250" y="-250" width="500" height="500" fill="#f39c12" stroke="#e67e22" stroke-width="5" rx="20"/>
    <rect x="-238" y="-238" width="476" height="476" fill="white" stroke="#fdebd0" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-238" y="-238" width="476" height="80" fill="#f39c12"/>
    <text x="0" y="-185" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">SIGNAL DESIGN</text>
    
    <!-- Icon area -->
    <rect x="-180" y="-140" width="360" height="120" fill="#fdebd0" stroke="#f39c12" stroke-width="3" rx="10"/>
    <text x="0" y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" fill="#f39c12">📡</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Define outputs & signals</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">That indicate loop state</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">and trigger actions</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 150)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Labels -->
    <text x="-150" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#f39c12">• Output formats</text>
    <text x="0" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#f39c12">• Log signals</text>
    <text x="150" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#f39c12">• Triggers</text>
  </g>
  
  <!-- Activity 3: Verification -->
  <g transform="translate(2000, 500)">
    <rect x="-250" y="-250" width="500" height="500" fill="#2ecc71" stroke="#27ae60" stroke-width="5" rx="20"/>
    <rect x="-238" y="-238" width="476" height="476" fill="white" stroke="#d5f5e3" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-238" y="-238" width="476" height="80" fill="#2ecc71"/>
    <text x="0" y="-185" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">VERIFICATION</text>
    
    <!-- Icon area -->
    <rect x="-180" y="-140" width="360" height="120" fill="#d5f5e3" stroke="#2ecc71" stroke-width="3" rx="10"/>
    <text x="0" y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" fill="#2ecc71">✓</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Create test suites</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">to validate outputs</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">before production</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 150)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Labels -->
    <text x="-150" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2ecc71">• Unit tests</text>
    <text x="0" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2ecc71">• Validation rules</text>
    <text x="150" y="-170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2ecc71">• Integration tests</text>
  </g>
  
  <!-- Connection arrows -->
  <path d="M 650 500 L 950 500" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  <path d="M 1450 500 L 1750 500" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  
  <!-- Flow labels -->
  <text x="800" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">feeds into</text>
  <text x="1600" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">validated by</text>
  
  <!-- Bottom summary -->
  <g transform="translate(1200, 1150)">
    <rect x="-400" y="-40" width="800" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="3" rx="12"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">These 3 activities replace traditional manual prompt writing</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">You design the system, not individual prompts</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>