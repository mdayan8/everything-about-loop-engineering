<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">LOOP ENGINEERING PATTERNS</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Building blocks that make loops work</text>
  
  <!-- Pattern 1: Instructions -->
  <g transform="translate(400, 400)">
    <rect x="-200" y="-150" width="400" height="300" fill="#3498db" stroke="#2980b9" stroke-width="5" rx="15"/>
    <rect x="-188" y="-138" width="376" height="276" fill="white" stroke="#d6eaf8" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-138" width="376" height="70" fill="#3498db"/>
    <text x="0" y="-88" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">INSTRUCTIONS</text>
    
    <!-- Icon -->
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#3498db">📋</text>
    
    <!-- Description -->
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">System prompts, rules</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Define how the AI</text>
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">should behave</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 150)">
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Pattern 2: Tools -->
  <g transform="translate(1200, 400)">
    <rect x="-200" y="-150" width="400" height="300" fill="#f39c12" stroke="#e67e22" stroke-width="5" rx="15"/>
    <rect x="-188" y="-138" width="376" height="276" fill="white" stroke="#fdebd0" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-138" width="376" height="70" fill="#f39c12"/>
    <text x="0" y="-88" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">TOOLS</text>
    
    <!-- Icon -->
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#f39c12">🔧</text>
    
    <!-- Description -->
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">MCP servers, APIs</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Extend what the AI</text>
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">can do and access</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 150)">
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Pattern 3: Validation -->
  <g transform="translate(2000, 400)">
    <rect x="-200" y="-150" width="400" height="300" fill="#2ecc71" stroke="#27ae60" stroke-width="5" rx="15"/>
    <rect x="-188" y="-138" width="376" height="276" fill="white" stroke="#d5f5e3" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-138" width="376" height="70" fill="#2ecc71"/>
    <text x="0" y="-88" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">VALIDATION</text>
    
    <!-- Icon -->
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#2ecc71">✓</text>
    
    <!-- Description -->
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Tests, gates, checks</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Verify outputs before</text>
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">they reach production</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 150)">
      <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
      <circle cx="-8" cy="-5" r="4" fill="white"/>
      <circle cx="8" cy="-5" r="4" fill="white"/>
      <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Connection arrows -->
  <path d="M 600 400 L 1000 400" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  <path d="M 1400 400 L 1800 400" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  
  <!-- Flow labels -->
  <text x="800" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">+ enables</text>
  <text x="1600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f39c12">+ ensures</text>
  
  <!-- Bottom section: How they work together -->
  <g transform="translate(1200, 850)">
    <rect x="-500" y="-80" width="1000" height="160" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="4" rx="15"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">HOW THEY WORK TOGETHER</text>
    
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Instructions tell AI what to do</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Tools let AI do it</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Validation makes sure it's done right</text>
  </g>
  
  <!-- Bottom note -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">These patterns are the building blocks of every loop</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>