<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">THE PROMPT ENGINEERING LOOP</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">Continuous feedback loop: Plan → Run → Monitor → Improve</text>
  
  <!-- Central machine -->
  <g transform="translate(1200, 650)">
    <!-- Main loop circle -->
    <circle cx="0" cy="0" r="280" fill="none" stroke="#3498db" stroke-width="12" stroke-dasharray="20,10"/>
    
    <!-- Phase 1: PLAN -->
    <g transform="translate(0, -250)">
      <rect x="-100" y="-50" width="200" height="100" fill="#3498db" stroke="#2980b9" stroke-width="4" rx="12"/>
      <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">PLAN</text>
      <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d6eaf8">Define tasks, targets, scope</text>
      
      <!-- 小黑 at this phase -->
      <g transform="translate(0, 95)">
        <!-- Body -->
        <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
        <!-- Eyes -->
        <circle cx="-10" cy="-8" r="5" fill="white"/>
        <circle cx="10" cy="-8" r="5" fill="white"/>
        <!-- Legs -->
        <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
        <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Phase 2: RUN -->
    <g transform="translate(250, 0)">
      <rect x="-50" y="-100" width="200" height="100" fill="#2ecc71" stroke="#27ae60" stroke-width="4" rx="12"/>
      <text x="50" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">RUN</text>
      <text x="50" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#d5f5e3">Execute with AI</text>
      
      <!-- 小黑 at this phase -->
      <g transform="translate(50, 100)">
        <!-- Body -->
        <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
        <!-- Eyes -->
        <circle cx="-10" cy="-8" r="5" fill="white"/>
        <circle cx="10" cy="-8" r="5" fill="white"/>
        <!-- Legs -->
        <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
        <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Phase 3: MONITOR -->
    <g transform="translate(0, 250)">
      <rect x="-100" y="-50" width="200" height="100" fill="#f39c12" stroke="#e67e22" stroke-width="4" rx="12"/>
      <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">MONITOR</text>
      <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fdebd0">Watch signals, check results</text>
      
      <!-- 小黑 at this phase -->
      <g transform="translate(0, -95)">
        <!-- Body -->
        <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
        <!-- Eyes -->
        <circle cx="-10" cy="-8" r="5" fill="white"/>
        <circle cx="10" cy="-8" r="5" fill="white"/>
        <!-- Legs -->
        <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
        <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Phase 4: IMPROVE -->
    <g transform="translate(-250, 0)">
      <rect x="-150" y="-100" width="200" height="100" fill="#9b59b6" stroke="#8e44ad" stroke-width="4" rx="12"/>
      <text x="-50" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">IMPROVE</text>
      <text x="-50" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#e8daef">Adjust rules, targets, prompts</text>
      
      <!-- 小黑 at this phase -->
      <g transform="translate(-50, 100)">
        <!-- Body -->
        <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
        <!-- Eyes -->
        <circle cx="-10" cy="-8" r="5" fill="white"/>
        <circle cx="10" cy="-8" r="5" fill="white"/>
        <!-- Legs -->
        <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
        <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Arrows between phases -->
    <path d="M 70 -200 L 200 -70" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
    <path d="M 200 70 L 70 200" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
    <path d="M -70 200 L -200 70" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
    <path d="M -200 -70 L -70 -200" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
    
    <!-- Center text -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">CONTINUOUS</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">LOOP</text>
  </g>
  
  <!-- Key insight callout -->
  <g transform="translate(250, 1150)">
    <rect x="-25" y="-35" width="400" height="70" fill="#e74c3c" stroke="#c0392b" stroke-width="4" rx="10"/>
    <text x="175" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">YOU are the human in the loop</text>
    <text x="175" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fadbd8">You design the loop, AI runs it</text>
  </g>
  
  <!-- Bottom note -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">Each iteration makes the system smarter, safer, and more autonomous</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>