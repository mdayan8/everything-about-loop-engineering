<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">THE SIX BUILDING BLOCKS IN ACTION</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">How each component powers the loop</text>
  
  <!-- Main loop structure -->
  <g transform="translate(1200, 700)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#34495e" stroke-width="8" stroke-dasharray="15,8"/>
    
    <!-- Center text -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">THE LOOP</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7f8c8d">Runs continuously</text>
    
    <!-- Block 1: Trigger -->
    <g transform="translate(0, -280)">
      <rect x="-100" y="-60" width="200" height="120" fill="#e74c3c" stroke="#c0392b" stroke-width="4" rx="12"/>
      <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">TRIGGER</text>
      <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fadbd8">When to start</text>
      <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fadbd8">e.g., PR merge, cron</text>
      
      <!-- 小黑 -->
      <g transform="translate(0, 100)">
        <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
        <circle cx="-8" cy="-5" r="4" fill="white"/>
        <circle cx="8" cy="-5" r="4" fill="white"/>
        <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Block 2: Context -->
    <g transform="translate(280, 0)">
      <rect x="-60" y="-100" width="200" height="120" fill="#9b59b6" stroke="#8e44ad" stroke-width="4" rx="12"/>
      <text x="40" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">CONTEXT</text>
      <text x="40" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e8daef">What to know</text>
      <text x="40" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e8daef">Codebase, history</text>
      
      <!-- 小黑 -->
      <g transform="translate(40, 100)">
        <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
        <circle cx="-8" cy="-5" r="4" fill="white"/>
        <circle cx="8" cy="-5" r="4" fill="white"/>
        <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Block 3: Instructions -->
    <g transform="translate(0, 280)">
      <rect x="-100" y="-60" width="200" height="120" fill="#f39c12" stroke="#e67e22" stroke-width="4" rx="12"/>
      <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">INSTRUCTIONS</text>
      <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fdebd0">How to act</text>
      <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fdebd0">Rules, constraints</text>
      
      <!-- 小黑 -->
      <g transform="translate(0, -100)">
        <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
        <circle cx="-8" cy="-5" r="4" fill="white"/>
        <circle cx="8" cy="-5" r="4" fill="white"/>
        <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Block 4: Model -->
    <g transform="translate(-280, 0)">
      <rect x="-140" y="-100" width="200" height="120" fill="#3498db" stroke="#2980b9" stroke-width="4" rx="12"/>
      <text x="-40" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">MODEL</text>
      <text x="-40" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#d6eaf8">Who executes</text>
      <text x="-40" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d6eaf8">Claude, GPT, etc.</text>
      
      <!-- 小黑 -->
      <g transform="translate(-40, 100)">
        <ellipse cx="0" cy="0" rx="28" ry="25" fill="#2c3e50"/>
        <circle cx="-8" cy="-5" r="4" fill="white"/>
        <circle cx="8" cy="-5" r="4" fill="white"/>
        <line x1="-12" y1="25" x2="-14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <line x1="12" y1="25" x2="14" y2="48" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Block 5: Output -->
    <g transform="translate(200, 200)">
      <rect x="-50" y="-50" width="150" height="100" fill="#2ecc71" stroke="#27ae60" stroke-width="4" rx="12"/>
      <text x="25" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">OUTPUT</text>
      <text x="25" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d5f5e3">What it produces</text>
      
      <!-- 小黑 -->
      <g transform="translate(25, 85)">
        <ellipse cx="0" cy="0" rx="22" ry="20" fill="#2c3e50"/>
        <circle cx="-6" cy="-4" r="3" fill="white"/>
        <circle cx="6" cy="-4" r="3" fill="white"/>
        <line x1="-9" y1="20" x2="-11" y2="38" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <line x1="9" y1="20" x2="11" y2="38" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Block 6: Verification -->
    <g transform="translate(-200, 200)">
      <rect x="-100" y="-50" width="150" height="100" fill="#e67e22" stroke="#d35400" stroke-width="4" rx="12"/>
      <text x="-25" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">VERIFY</text>
      <text x="-25" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fdebd0">Is it correct?</text>
      
      <!-- 小黑 -->
      <g transform="translate(-25, 85)">
        <ellipse cx="0" cy="0" rx="22" ry="20" fill="#2c3e50"/>
        <circle cx="-6" cy="-4" r="3" fill="white"/>
        <circle cx="6" cy="-4" r="3" fill="white"/>
        <line x1="-9" y1="20" x2="-11" y2="38" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <line x1="9" y1="20" x2="11" y2="38" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
    
    <!-- Connecting arrows -->
    <path d="M 50 -195 L 195 -50" fill="none" stroke="#f39c12" stroke-width="5" marker-end="url(#arrowhead)"/>
    <path d="M 195 50 L 50 195" fill="none" stroke="#f39c12" stroke-width="5" marker-end="url(#arrowhead)"/>
    <path d="M -50 195 L -195 50" fill="none" stroke="#f39c12" stroke-width="5" marker-end="url(#arrowhead)"/>
    <path d="M -195 -50 L -50 -195" fill="none" stroke="#f39c12" stroke-width="5" marker-end="url(#arrowhead)"/>
    
    <!-- Additional connections -->
    <path d="M 150 150 L 180 180" fill="none" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/>
    <path d="M -150 150 L -180 180" fill="none" stroke="#d35400" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom note -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">All 6 blocks must work together for a complete, production-grade loop</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>