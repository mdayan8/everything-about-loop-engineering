<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="960" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2c3e50">THE SIX BUILDING BLOCKS</text>
  <text x="960" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Components that make up a loop engineering system</text>
  
  <!-- Central 小黑 character -->
  <g transform="translate(960, 540)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="50" ry="45" fill="#2c3e50"/>
    <!-- Eyes -->
    <circle cx="-15" cy="-10" r="7" fill="white"/>
    <circle cx="15" cy="-10" r="7" fill="white"/>
    <circle cx="-15" cy="-10" r="4" fill="#2c3e50"/>
    <circle cx="15" cy="-10" r="4" fill="#2c3e50"/>
    <!-- Arms -->
    <line x1="-40" y1="10" x2="-80" y2="-30" stroke="#2c3e50" stroke-width="8" stroke-linecap="round"/>
    <line x1="40" y1="10" x2="80" y2="-30" stroke="#2c3e50" stroke-width="8" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="-80" cy="-30" r="10" fill="#2c3e50"/>
    <circle cx="80" cy="-30" r="10" fill="#2c3e50"/>
    <!-- Legs -->
    <line x1="-20" y1="45" x2="-25" y2="100" stroke="#2c3e50" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="45" x2="25" y2="100" stroke="#2c3e50" stroke-width="8" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-25" cy="110" rx="15" ry="8" fill="#2c3e50"/>
    <ellipse cx="25" cy="110" rx="15" ry="8" fill="#2c3e50"/>
  </g>
  
  <!-- Building block 1: Automations (top) -->
  <g transform="translate(960, 200)">
    <rect x="-100" y="-40" width="200" height="80" fill="#3498db" stroke="#2980b9" stroke-width="3" rx="10"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">AUTOMATIONS</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d6eaf8">Schedule & trigger loops</text>
    
    <!-- Connection line to center -->
    <line x1="0" y1="40" x2="0" y2="300" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Building block 2: Worktrees (top right) -->
  <g transform="translate(1350, 350)">
    <rect x="-100" y="-40" width="200" height="80" fill="#e67e22" stroke="#d35400" stroke-width="3" rx="10"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">WORKTREES</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fdebd0">Isolate parallel agents</text>
    
    <!-- Connection line to center -->
    <line x1="-100" y1="0" x2="-290" y2="190" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Building block 3: Skills (right) -->
  <g transform="translate(1450, 540)">
    <rect x="-100" y="-40" width="200" height="80" fill="#2ecc71" stroke="#27ae60" stroke-width="3" rx="10"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">SKILLS</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d5f5e3">Project context for agents</text>
    
    <!-- Connection line to center -->
    <line x1="-100" y1="0" x2="-390" y2="0" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Building block 4: Plugins (bottom right) -->
  <g transform="translate(1350, 730)">
    <rect x="-100" y="-40" width="200" height="80" fill="#9b59b6" stroke="#8e44ad" stroke-width="3" rx="10"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">PLUGINS</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e8daef">External tool access</text>
    
    <!-- Connection line to center -->
    <line x1="-100" y1="0" x2="-290" y2="-190" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Building block 5: Sub-Agents (bottom) -->
  <g transform="translate(960, 880)">
    <rect x="-100" y="-40" width="200" height="80" fill="#e74c3c" stroke="#c0392b" stroke-width="3" rx="10"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">SUB-AGENTS</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fadbd8">Independent verification</text>
    
    <!-- Connection line to center -->
    <line x1="0" y1="-40" x2="0" y2="-290" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Building block 6: Memory (bottom left) -->
  <g transform="translate(570, 730)">
    <rect x="-100" y="-40" width="200" height="80" fill="#1abc9c" stroke="#16a085" stroke-width="3" rx="10"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">MEMORY</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d1f2eb">Persistent state files</text>
    
    <!-- Connection line to center -->
    <line x1="100" y1="0" x2="290" y2="-190" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Connection label -->
  <g transform="translate(470, 540)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f39c12">COMBINE</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">&</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f39c12">COORDINATE</text>
    
    <!-- Connection line to center -->
    <line x1="100" y1="0" x2="390" y2="0" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Additional connection lines between blocks -->
  <line x1="1060" y1="230" x2="1250" y2="310" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="1450" y1="380" x2="1450" y2="500" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="1350" y1="700" x2="1060" y2="850" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="570" y1="700" x2="920" y2="850" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="470" y1="510" x2="920" y2="540" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Bottom annotation -->
  <text x="960" y="1000" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">A minimal loop needs only 2 components: Memory + Automations</text>
  <text x="960" y="1030" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#95a5a6">Production loops typically use 4-5 components</text>
</svg>