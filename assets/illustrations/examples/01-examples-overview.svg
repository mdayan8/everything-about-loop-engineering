<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1350">
  <!-- Pure white background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">LOOP ENGINEERING EXAMPLES</text>
  <text x="1200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7f8c8d">From simple to complex: real-world loop implementations</text>
  
  <!-- Example 1: Simple -->
  <g transform="translate(300, 450)">
    <rect x="-200" y="-200" width="400" height="400" fill="#27ae60" stroke="#229954" stroke-width="5" rx="15"/>
    <rect x="-188" y="-188" width="376" height="376" fill="white" stroke="#d5f5e3" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-188" width="376" height="80" fill="#27ae60"/>
    <text x="0" y="-135" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">SIMPLE</text>
    
    <!-- Icon -->
    <text x="0" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#27ae60">1️⃣</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Beginner</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Cron + while loop</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Git log context</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">File read/write</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Claude Sonnet</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 180)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Complexity indicator -->
    <text x="0" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#27ae60">★☆☆☆☆</text>
  </g>
  
  <!-- Example 2: Intermediate -->
  <g transform="translate(900, 450)">
    <rect x="-200" y="-200" width="400" height="400" fill="#f39c12" stroke="#e67e22" stroke-width="5" rx="15"/>
    <rect x="-188" y="-188" width="376" height="376" fill="white" stroke="#fdebd0" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-188" width="376" height="80" fill="#f39c12"/>
    <text x="0" y="-135" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">INTERMEDIATE</text>
    
    <!-- Icon -->
    <text x="0" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#f39c12">2️⃣</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Confidence Ladder</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">GitHub Actions</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">GitHub API context</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Tests → deploy gating</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Claude Opus</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 180)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Complexity indicator -->
    <text x="0" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#f39c12">★★★☆☆</text>
  </g>
  
  <!-- Example 3: Advanced -->
  <g transform="translate(1500, 450)">
    <rect x="-200" y="-200" width="400" height="400" fill="#e74c3c" stroke="#c0392b" stroke-width="5" rx="15"/>
    <rect x="-188" y="-188" width="376" height="376" fill="white" stroke="#fadbd8" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-188" width="376" height="80" fill="#e74c3c"/>
    <text x="0" y="-135" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">ADVANCED</text>
    
    <!-- Icon -->
    <text x="0" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#e74c3c">3️⃣</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">PR Gatekeeper</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">PR webhooks trigger</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Rich context aggregation</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Multi-stage verification</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Claude Opus + sandbox</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 180)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Complexity indicator -->
    <text x="0" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e74c3c">★★★★☆</text>
  </g>
  
  <!-- Example 4: Expert -->
  <g transform="translate(2100, 450)">
    <rect x="-200" y="-200" width="400" height="400" fill="#8e44ad" stroke="#7d3c98" stroke-width="5" rx="15"/>
    <rect x="-188" y="-188" width="376" height="376" fill="white" stroke="#e8daef" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="-188" y="-188" width="376" height="80" fill="#8e44ad"/>
    <text x="0" y="-135" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">EXPERT</text>
    
    <!-- Icon -->
    <text x="0" y="-60" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" fill="#8e44ad">4️⃣</text>
    
    <!-- Description -->
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Full-Stack Auto-Deploy</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">PR + schedule triggers</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Multi-source context</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Full validation pipeline</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">Claude Opus + sandbox</text>
    
    <!-- 小黑 -->
    <g transform="translate(0, 180)">
      <ellipse cx="0" cy="0" rx="35" ry="32" fill="#2c3e50"/>
      <circle cx="-10" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="5" fill="white"/>
      <line x1="-15" y1="32" x2="-18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
      <line x1="15" y1="32" x2="18" y2="60" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    </g>
    
    <!-- Complexity indicator -->
    <text x="0" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8e44ad">★★★★★</text>
  </g>
  
  <!-- Progression arrow -->
  <path d="M 400 700 L 2000 700" fill="none" stroke="#f39c12" stroke-width="6" marker-end="url(#arrowhead)"/>
  <text x="1200" y="740" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#f39c12">Increasing complexity and capability</text>
  
  <!-- Bottom note -->
  <text x="1200" y="1250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#7f8c8d">Start simple, graduate to advanced as your team builds confidence</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f39c12"/>
    </marker>
  </defs>
</svg>